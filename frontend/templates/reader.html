<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Embedded Reader - Readofy</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script type="text/javascript" src="https://www.google.com/books/jsapi.js"></script>
    <style>
        body { margin: 0; padding: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; background-color: var(--bg-color); }
        .reader-header { display: flex; justify-content: space-between; align-items: center; padding: 1rem 2rem; background-color: var(--bg-secondary); border-bottom: 1px solid var(--border-color); z-index: 10; }
        .reader-container { flex-grow: 1; display: flex; justify-content: center; align-items: stretch; padding: 1rem; overflow: hidden; }
        .canvas-wrapper { width: 100%; max-width: 1400px; height: 100%; overflow: hidden; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); margin: 0 auto; background: #ffffff;}
        #viewerCanvas { width: 100%; height: calc(100% + 45px); margin-bottom: -45px; }
    </style>
</head>
<body>
    <header class="reader-header">
        <div class="logo">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: var(--accent-color);"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></svg>
            Readofy Reader
        </div>
        <a href="{{ url_for('book.dashboard') }}" class="btn btn-secondary">Close Reader</a>
    </header>
    
    <div class="reader-container">
        <div class="canvas-wrapper">
            <div id="viewerCanvas" style="width: 100%; height: calc(100% + 45px); margin-bottom: -45px;"></div>
        </div>
    </div>

    <script type="text/javascript">
      // Check if Brave Shields or an Adblocker blocked the Google Books script
      if (typeof google === 'undefined' || typeof google.books === 'undefined') {
          window.onload = function() {
              var container = document.getElementById('viewerCanvas');
              container.style.display = 'flex';
              container.style.flexDirection = 'column';
              container.style.justifyContent = 'center';
              container.style.alignItems = 'center';
              container.style.height = '100%';
              container.innerHTML = `
                <div style="text-align: center; color: #171717; padding: 2rem;">
                   <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#f97316" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom: 1rem;"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
                   <h2 style="font-family: 'Outfit', sans-serif; margin-bottom: 0.5rem;">Adblocker Detected</h2>
                   <p style="font-family: 'Outfit', sans-serif; color: #666; max-width: 450px; line-height: 1.5;">It looks like your browser (like Brave Shields) is blocking the Google Books Reader script. Please disable your adblocker for localhost to read books.</p>
                   <button onclick="window.location.reload()" style="padding: 0.6rem 1.2rem; background: var(--accent-color); color: white; border: none; border-radius: 6px; cursor: pointer; margin-top: 1.5rem; font-family: 'Outfit', sans-serif; font-weight: 500;">Reload Page</button>
                </div>
              `;
          };
      } else {
          // Initialize Google Books JS properly at parse time
          google.books.load();
          google.books.setOnLoadCallback(initialize);
      }

      function initialize() {
        var viewer = new google.books.DefaultViewer(document.getElementById('viewerCanvas'), {showLinkChrome: false});
        viewer.load('{{ book_id }}', notFound);
      }
      
      function notFound() {
          var container = document.getElementById('viewerCanvas');
          container.style.display = 'flex';
          container.style.flexDirection = 'column';
          container.style.justifyContent = 'center';
          container.style.alignItems = 'center';
          container.innerHTML = `
            <div style="text-align: center; color: #171717; padding: 2rem;">
               <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom: 1rem;"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
               <h2 style="font-family: 'Outfit', sans-serif; margin-bottom: 0.5rem;">Preview Restricted</h2>
               <p style="font-family: 'Outfit', sans-serif; color: #666; max-width: 400px; line-height: 1.5;">We apologize, but the publisher has restricted this specific book from being embedded or previewed digitally.</p>
               <button onclick="window.history.back()" style="padding: 0.6rem 1.2rem; background: var(--accent-color); color: white; border: none; border-radius: 6px; cursor: pointer; margin-top: 1.5rem; font-family: 'Outfit', sans-serif; font-weight: 500;">Go Back</button>
            </div>
          `;
      }
    </script>
</body>
</html>
